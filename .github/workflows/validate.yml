name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: .
          additional_files: install.sh

  validate-speckit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Read pinned Speckit version
        id: speckit
        run: echo "version=$(cat .speckit-version)" >> "$GITHUB_OUTPUT"

      - name: Install Spec Kit CLI
        run: uvx --from "git+https://github.com/github/spec-kit.git@v${{ steps.speckit.outputs.version }}" specify version

      - name: Run validation
        run: bash scripts/validate-speckit.sh
