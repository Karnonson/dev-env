schema_version: "1.0"

workflow:
  id: "orchestrator-design-first"
  name: "Design-First SDD Cycle"
  version: "1.0.0"
  author: "Karnon"
  description: "Runs constitution -> design -> specify -> plan -> tasks -> analyze -> backend -> UI with explicit review gates."

requires:
  speckit_version: ">=0.6.1"
  integrations:
    any: ["copilot", "claude", "gemini"]

inputs:
  feature_name:
    type: string
    required: true
    prompt: "Feature name"
  integration:
    type: string
    default: "copilot"
    prompt: "Integration to use (e.g. copilot, claude, gemini)"

steps:
  - id: constitution
    command: speckit.constitution
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: review-constitution
    type: gate
    message: "Review the project principles before the design pass starts."
    options: [approve, reject]
    on_reject: abort

  - id: design
    command: speckit.design
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: review-design
    type: gate
    message: "Review the design direction before specification."
    options: [approve, reject]
    on_reject: abort

  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: review-spec
    type: gate
    message: "Review the generated spec before planning."
    options: [approve, reject]
    on_reject: abort

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: review-plan
    type: gate
    message: "Review the plan before generating tasks."
    options: [approve, reject]
    on_reject: abort

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: analyze
    command: speckit.analyze
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: review-analysis
    type: gate
    message: "Review the analysis report before implementation. Continue only if critical issues are resolved or explicitly accepted."
    options: [approve, reject]
    on_reject: abort

  - id: implement-backend
    command: speckit.implement.backend
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: review-backend
    type: gate
    message: "Review the backend slice before UI implementation starts."
    options: [approve, reject]
    on_reject: abort

  - id: implement-ui
    command: speckit.implement.ui
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: review-implementation
    type: gate
    message: "Review the full implementation and run Code Reviewer before final verification."
    options: [approve, reject]
    on_reject: abort