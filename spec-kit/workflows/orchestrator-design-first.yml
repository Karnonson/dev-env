schema_version: "1.0"

workflow:
  id: "orchestrator-design-first"
  name: "Strategist-Led SDD Cycle"
  version: "2.0.0"
  author: "Karnon"
  description: "Strategist -> constitution -> specify -> design -> plan -> tasks -> analyze -> backend -> UI -> test -> review on a feature branch with explicit gates."

requires:
  speckit_version: ">=0.6.1"
  integrations:
    any: ["copilot", "claude", "gemini"]

inputs:
  feature_name:
    type: string
    required: true
    prompt: "Feature name"
  integration:
    type: string
    default: "copilot"
    prompt: "Integration to use (e.g. copilot, claude, gemini)"

steps:
  - id: strategist-preamble
    type: gate
    message: "Before running this pipeline, the Strategist should have already explored and approved the feature idea interactively. Confirm the idea is ready for the formal SDD cycle."
    options: [approve, abort]
    on_reject: abort

  - id: constitution
    command: speckit.constitution
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: review-constitution
    type: gate
    message: "Review the project principles before specification starts. The Strategist should have already clarified the feature idea before this point."
    options: [approve, reject]
    on_reject: abort

  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: review-spec
    type: gate
    message: "Review the generated spec before the design pass."
    options: [approve, reject]
    on_reject: abort

  - id: design
    command: speckit.design
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: review-design
    type: gate
    message: "Review the design system and brand identity before planning."
    options: [approve, reject]
    on_reject: abort

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: review-plan
    type: gate
    message: "Review the plan before generating tasks."
    options: [approve, reject]
    on_reject: abort

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: analyze
    command: speckit.analyze
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: review-analysis
    type: gate
    message: "Review the analysis report, confirm the active feature branch is ready, and continue only if critical issues are resolved or explicitly accepted."
    options: [approve, reject]
    on_reject: abort

  - id: implement-backend
    command: speckit.implement.backend
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: review-backend
    type: gate
    message: "Review the backend slice on the feature branch before UI implementation starts."
    options: [approve, reject]
    on_reject: abort

  - id: implement-ui
    command: speckit.implement.ui
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: test
    command: speckit.test
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.feature_name }}"

  - id: review-tests
    type: gate
    message: "Review the test results. All tests must pass before code review."
    options: [approve, reject]
    on_reject: abort

  - id: review-implementation
    type: gate
    message: "Run Code Reviewer on the full implementation. Address all critical findings before merge readiness."
    options: [approve, reject]
    on_reject: abort

  - id: merge-readiness
    type: gate
    message: "Merge to main only after tests pass, review is addressed, and kite verify feature is green on the feature branch."
    options: [approve, reject]
    on_reject: abort